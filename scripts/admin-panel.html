<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EşleşBuluş Admin Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { font-family: 'Inter', sans-serif; }
body { background: #0f172a; color: #e2e8f0; }
.sidebar { background: #1e293b; min-height: 100vh; width: 260px; position: fixed; left: 0; top: 0; z-index: 40; transition: transform 0.3s; }
.main-content { margin-left: 260px; min-height: 100vh; }
.card { background: #1e293b; border-radius: 12px; border: 1px solid #334155; }
.card-hover:hover { border-color: #6366f1; box-shadow: 0 0 20px rgba(99,102,241,0.1); }
.stat-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
.btn-primary { background: #6366f1; color: white; padding: 8px 20px; border-radius: 8px; font-weight: 500; transition: all 0.2s; }
.btn-primary:hover { background: #4f46e5; transform: translateY(-1px); }
.btn-danger { background: #ef4444; color: white; padding: 6px 16px; border-radius: 8px; font-weight: 500; }
.btn-danger:hover { background: #dc2626; }
.btn-success { background: #22c55e; color: white; padding: 6px 16px; border-radius: 8px; font-weight: 500; }
.btn-success:hover { background: #16a34a; }
.btn-warning { background: #f59e0b; color: white; padding: 6px 16px; border-radius: 8px; font-weight: 500; }
.btn-warning:hover { background: #d97706; }
.input { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 8px 14px; color: #e2e8f0; width: 100%; outline: none; }
.input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
.nav-item { padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 8px; margin: 2px 12px; transition: all 0.2s; color: #94a3b8; }
.nav-item:hover { background: #334155; color: #e2e8f0; }
.nav-item.active { background: #6366f1; color: white; }
.badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
.badge-green { background: #065f46; color: #6ee7b7; }
.badge-red { background: #7f1d1d; color: #fca5a5; }
.badge-yellow { background: #78350f; color: #fcd34d; }
.badge-blue { background: #1e3a5f; color: #93c5fd; }
.badge-purple { background: #3b0764; color: #c4b5fd; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px 16px; color: #94a3b8; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #334155; }
td { padding: 12px 16px; border-bottom: 1px solid #1e293b; }
tr:hover td { background: #1e293b44; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
.modal { background: #1e293b; border-radius: 16px; padding: 24px; min-width: 500px; max-width: 90vw; max-height: 85vh; overflow-y: auto; border: 1px solid #334155; }
.avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #334155; }
.avatar-sm { width: 32px; height: 32px; }
.avatar-lg { width: 80px; height: 80px; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0f172a; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #475569; }
.pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.login-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); }
.photo-grid img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; cursor: pointer; }
.photo-grid img:hover { opacity: 0.8; transform: scale(1.05); transition: 0.2s; }
.toggle { width: 44px; height: 24px; border-radius: 12px; background: #475569; cursor: pointer; position: relative; transition: 0.3s; }
.toggle.on { background: #6366f1; }
.toggle::after { content: ''; width: 20px; height: 20px; border-radius: 50%; background: white; position: absolute; top: 2px; left: 2px; transition: 0.3s; }
.toggle.on::after { left: 22px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-bg min-h-screen flex items-center justify-center">
  <div class="card p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">💕</div>
      <h1 class="text-2xl font-bold text-white">EşleşBuluş</h1>
      <p class="text-slate-400 mt-1">Admin Panel</p>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Kullanıcı Adı</label>
        <input id="loginUser" class="input" placeholder="admin" autocomplete="username">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Şifre</label>
        <input id="loginPass" type="password" class="input" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div id="loginError" class="text-red-400 text-sm hidden"></div>
      <button onclick="doLogin()" class="btn-primary w-full py-3 text-center">Giriş Yap</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appContainer" class="hidden">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="p-5 border-b border-slate-700">
      <div class="flex items-center gap-3">
        <span class="text-2xl">💕</span>
        <div>
          <h2 class="text-lg font-bold text-white">EşleşBuluş</h2>
          <p class="text-xs text-slate-400">Admin Panel</p>
        </div>
      </div>
    </div>
    <nav class="py-4">
      <div class="nav-item active" onclick="navigate('dashboard')">
        <span>📊</span><span>Dashboard</span>
      </div>
      <div class="nav-item" onclick="navigate('users')">
        <span>👥</span><span>Kullanıcılar</span>
      </div>
      <div class="nav-item" onclick="navigate('posts')">
        <span>📝</span><span>Gönderiler</span>
      </div>
      <div class="nav-item" onclick="navigate('chats')">
        <span>💬</span><span>Mesajlar</span>
      </div>
      <div class="nav-item" onclick="navigate('stories')">
        <span>📸</span><span>Hikayeler</span>
      </div>
      <div class="nav-item" onclick="navigate('reports')">
        <span>🚨</span><span>Şikayetler</span>
      </div>
      <div class="nav-item" onclick="navigate('notifications')">
        <span>🔔</span><span>Bildirimler</span>
      </div>
      <div class="nav-item" onclick="navigate('gifts')">
        <span>🎁</span><span>Hediyeler</span>
      </div>
      <div class="nav-item" onclick="navigate('analytics')">
        <span>📈</span><span>Analizler</span>
      </div>
      <div class="nav-item" onclick="navigate('system')">
        <span>🛠️</span><span>Sistem Durumu</span>
      </div>
      <div class="nav-item" onclick="navigate('fakeusers')">
        <span>🤖</span><span>Fake Kullanıcılar</span>
      </div>
      <div class="nav-item" onclick="navigate('botsettings')">
        <span>🧠</span><span>Bot AI Ayarları</span>
      </div>
      <div class="nav-item" onclick="navigate('settings')">
        <span>⚙️</span><span>Ayarlar</span>
      </div>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-slate-700">
      <button onclick="doLogout()" class="text-slate-400 hover:text-white text-sm flex items-center gap-2 w-full">
        <span>🚪</span> Çıkış Yap
      </button>
    </div>
  </div>

  <!-- Main -->
  <div class="main-content p-6">
    <div id="pageContent"></div>
  </div>
</div>

<!-- Modal container -->
<div id="modalContainer"></div>

<script>
const API = '/admin/api';
let TOKEN = localStorage.getItem('admin_token') || '';
let currentPage = 'dashboard';

// ── Auth ──
async function doLogin() {
  const user = document.getElementById('loginUser').value;
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  try {
    const res = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Hata');
    TOKEN = data.token;
    localStorage.setItem('admin_token', TOKEN);
    showApp();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

function doLogout() {
  TOKEN = '';
  localStorage.removeItem('admin_token');
  document.getElementById('appContainer').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
}

function showApp() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('appContainer').classList.remove('hidden');
  navigate('dashboard');
}

// Check token on load
if (TOKEN) {
  apiFetch('/dashboard').then(() => showApp()).catch(() => doLogout());
}

// ── API Helper ──
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN, ...opts.headers },
  });
  if (res.status === 401) { doLogout(); throw new Error('Oturum suresi doldu'); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Hata');
  return data;
}

// ── Navigation ──
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navItems = document.querySelectorAll('.nav-item');
  const pageNames = ['dashboard','users','posts','chats','stories','reports','notifications','gifts','analytics','system','fakeusers','botsettings','settings'];
  const idx = pageNames.indexOf(page);
  if (idx >= 0 && navItems[idx]) navItems[idx].classList.add('active');
  renderPage(page);
}

function renderPage(page) {
  const c = document.getElementById('pageContent');
  c.innerHTML = '<div class="text-center py-20"><div class="pulse text-4xl">⏳</div><p class="text-slate-400 mt-4">Yükleniyor...</p></div>';
  switch(page) {
    case 'dashboard': renderDashboard(); break;
    case 'users': renderUsers(); break;
    case 'posts': renderPosts(); break;
    case 'chats': renderChats(); break;
    case 'stories': renderStories(); break;
    case 'reports': renderReports(); break;
    case 'notifications': renderNotifications(); break;
    case 'gifts': renderGifts(); break;
    case 'fakeusers': renderFakeUsers(); break;
    case 'botsettings': renderBotSettings(); break;
    case 'analytics': renderAnalytics(); break;
    case 'system': renderSystem(); break;
    case 'settings': renderSettings(); break;
  }
}

// ════════════════════════════════════════
//  DASHBOARD
// ════════════════════════════════════════
async function renderDashboard() {
  const d = await apiFetch('/dashboard');
  const c = document.getElementById('pageContent');
  c.innerHTML = `
    <h1 class="text-2xl font-bold text-white mb-6">Dashboard</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      ${statCard('👥', 'Toplam Kullanıcı', d.totalUsers, 'blue')}
      ${statCard('🟢', 'Çevrimiçi', d.onlineUsers, 'green')}
      ${statCard('📝', 'Toplam Gönderi', d.totalPosts, 'purple')}
      ${statCard('💬', 'Toplam Mesaj', d.totalMessages, 'yellow')}
      ${statCard('📅', 'Bugün Kayıt', d.todayUsers, 'blue')}
      ${statCard('📅', 'Bu Hafta Kayıt', d.weekUsers, 'blue')}
      ${statCard('⭐', 'Premium', d.premiumUsers, 'purple')}
      ${statCard('🪙', 'Dolaşımdaki Jeton', d.totalTokensInCirculation, 'yellow')}
      ${statCard('💬', 'Toplam Sohbet', d.totalChats, 'green')}
      ${statCard('📸', 'Aktif Hikaye', d.totalStories, 'purple')}
      ${statCard('🔌', 'Socket Bağlantı', d.connectedSockets, 'green')}
      ${statCard('📝', 'Bugün Gönderi', d.todayPosts, 'blue')}
    </div>
  `;
}

function statCard(icon, label, value, color) {
  const colors = {
    blue: 'from-blue-900/50 to-blue-950/30 border-blue-800/50',
    green: 'from-emerald-900/50 to-emerald-950/30 border-emerald-800/50',
    purple: 'from-purple-900/50 to-purple-950/30 border-purple-800/50',
    yellow: 'from-amber-900/50 to-amber-950/30 border-amber-800/50',
  };
  return `<div class="rounded-xl border p-5 bg-gradient-to-br ${colors[color] || colors.blue}">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-slate-400 text-sm">${label}</p>
        <p class="text-3xl font-bold text-white mt-1">${typeof value === 'number' ? value.toLocaleString('tr-TR') : value}</p>
      </div>
      <div class="text-3xl">${icon}</div>
    </div>
  </div>`;
}

// ════════════════════════════════════════
//  USERS
// ════════════════════════════════════════
let usersPage = 1;
async function renderUsers(page = 1) {
  usersPage = page;
  const search = document.getElementById('userSearch')?.value || '';
  const d = await apiFetch(`/users?page=${page}&limit=20&search=${encodeURIComponent(search)}`);
  const c = document.getElementById('pageContent');
  c.innerHTML = `
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-white">Kullanıcılar <span class="text-slate-400 text-lg">(${d.total})</span></h1>
      <div class="flex gap-2">
        <input id="userSearch" class="input w-64" placeholder="İsim, email veya UID ara..." value="${search}" onkeyup="if(event.key==='Enter')renderUsers(1)">
        <button onclick="renderUsers(1)" class="btn-primary">Ara</button>
      </div>
    </div>
    <div class="card overflow-hidden">
      <table>
        <thead><tr>
          <th>Kullanıcı</th><th>Email</th><th>Şehir</th><th>Yaş</th><th>Jeton</th><th>Durum</th><th>Kayıt</th><th>İşlem</th>
        </tr></thead>
        <tbody>
          ${d.users.map(u => `<tr>
            <td>
              <div class="flex items-center gap-3">
                <img class="avatar" src="${u.photoURL || u.photos?.[0] || ''}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect fill=%22%23334155%22 width=%2240%22 height=%2240%22/><text x=%2220%22 y=%2225%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22 font-size=%2216%22>?</text></svg>'">
                <div>
                  <p class="font-medium text-white">${esc(u.name || 'İsimsiz')}</p>
                  <p class="text-xs text-slate-500">${u.uid?.substring(0,12)}...</p>
                </div>
              </div>
            </td>
            <td class="text-sm text-slate-400">${esc(u.email || '-')}</td>
            <td class="text-sm">${esc(u.city || '-')}</td>
            <td class="text-sm">${u.age || '-'}</td>
            <td class="text-sm font-medium text-amber-400">🪙 ${u.tokens || 0}</td>
            <td>
              ${u.online ? '<span class="badge badge-green">Çevrimiçi</span>' : '<span class="badge" style="background:#334155;color:#64748b">Çevrimdışı</span>'}
              ${u.isPremium ? ' <span class="badge badge-purple">Premium</span>' : ''}
              ${u.banned ? ' <span class="badge badge-red">Banlı</span>' : ''}
              ${u.verified ? ' <span class="badge badge-blue">✓</span>' : ''}
            </td>
            <td class="text-sm text-slate-400">${formatDate(u.createdAt)}</td>
            <td>
              <button onclick="showUserDetail('${u.uid}')" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium">Detay</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    ${pagination(d.page, d.pages, 'renderUsers')}
  `;
}

async function showUserDetail(uid) {
  const u = await apiFetch(`/users/${uid}`);
  const baseUrl = location.origin;
  showModal(`
    <div class="flex items-center gap-4 mb-6">
      <img class="avatar-lg" src="${u.photoURL || u.photos?.[0] || ''}" onerror="this.style.display='none'">
      <div>
        <h2 class="text-xl font-bold text-white">${esc(u.name || 'İsimsiz')}</h2>
        <p class="text-slate-400">${esc(u.email)}</p>
        <p class="text-xs text-slate-500 mt-1">UID: ${u.uid}</p>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="card p-3"><span class="text-slate-400 text-sm">Cinsiyet:</span> <span class="text-white">${u.gender || '-'}</span></div>
      <div class="card p-3"><span class="text-slate-400 text-sm">Yaş:</span> <span class="text-white">${u.age || '-'}</span></div>
      <div class="card p-3"><span class="text-slate-400 text-sm">Şehir:</span> <span class="text-white">${u.city || '-'}</span></div>
      <div class="card p-3"><span class="text-slate-400 text-sm">Boy:</span> <span class="text-white">${u.height ? u.height + ' cm' : '-'}</span></div>
      <div class="card p-3"><span class="text-slate-400 text-sm">Meslek:</span> <span class="text-white">${u.job || '-'}</span></div>
      <div class="card p-3"><span class="text-slate-400 text-sm">Doğum:</span> <span class="text-white">${u.birthDate || '-'}</span></div>
    </div>
    ${u.bio ? `<div class="card p-3 mb-4"><span class="text-slate-400 text-sm">Bio:</span><p class="text-white mt-1">${esc(u.bio)}</p></div>` : ''}
    ${u.interests?.length ? `<div class="card p-3 mb-4"><span class="text-slate-400 text-sm">İlgi Alanları:</span><div class="flex flex-wrap gap-2 mt-2">${u.interests.map(i => `<span class="badge badge-blue">${esc(i)}</span>`).join('')}</div></div>` : ''}
    ${u.photos?.length ? `<div class="card p-3 mb-4"><span class="text-slate-400 text-sm">Fotoğraflar:</span><div class="photo-grid flex flex-wrap gap-2 mt-2">${u.photos.map(p => `<img src="${p}" onerror="this.style.display='none'">`).join('')}</div></div>` : ''}
    <div class="card p-4 mb-4">
      <h3 class="font-semibold text-white mb-3">Yönetim</h3>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-sm text-slate-400">Jeton</label>
          <input id="editTokens" type="number" class="input mt-1" value="${u.tokens || 0}">
        </div>
        <div>
          <label class="text-sm text-slate-400">Premium Bitiş</label>
          <input id="editPremiumExpiry" type="date" class="input mt-1" value="${u.premiumExpiry ? new Date(u.premiumExpiry).toISOString().split('T')[0] : ''}">
        </div>
      </div>
      <div class="flex flex-wrap gap-3 mt-4">
        <button onclick="toggleUserField('${u.uid}','isPremium',${!u.isPremium})" class="${u.isPremium ? 'btn-warning' : 'btn-success'}">${u.isPremium ? 'Premium Kaldır' : 'Premium Yap'}</button>
        <button onclick="toggleUserField('${u.uid}','verified',${!u.verified})" class="${u.verified ? 'btn-warning' : 'btn-success'}">${u.verified ? 'Doğrulama Kaldır' : 'Doğrula'}</button>
        <button onclick="toggleUserField('${u.uid}','vip',${!u.vip})" class="${u.vip ? 'btn-warning' : 'btn-success'}">${u.vip ? 'VIP Kaldır' : 'VIP Yap'}</button>
        <button onclick="toggleUserField('${u.uid}','banned',${!u.banned})" class="${u.banned ? 'btn-success' : 'btn-danger'}">${u.banned ? 'Ban Kaldır' : 'Banla'}</button>
        <button onclick="toggleUserField('${u.uid}','suspended',${!u.suspended})" class="${u.suspended ? 'btn-success' : 'btn-warning'}">${u.suspended ? 'Askıyı Kaldır' : 'Askıya Al'}</button>
      </div>
      <div class="flex gap-2 mt-3">
        <button onclick="updateUserTokens('${u.uid}')" class="btn-primary">Jeton Güncelle</button>
        <button onclick="updateUserPremium('${u.uid}')" class="btn-primary">Premium Süre Güncelle</button>
      </div>
    </div>
    <div class="card p-3">
      <div class="grid grid-cols-2 gap-2 text-sm">
        <div><span class="text-slate-400">Kayıt:</span> <span class="text-white">${formatDateTime(u.createdAt)}</span></div>
        <div><span class="text-slate-400">Son Aktif:</span> <span class="text-white">${formatDateTime(u.lastActive)}</span></div>
        <div><span class="text-slate-400">Beğeni:</span> <span class="text-white">${u.likedUsers?.length || 0}</span></div>
        <div><span class="text-slate-400">Engellenen:</span> <span class="text-white">${u.blockedUsers?.length || 0}</span></div>
      </div>
    </div>
  `);
}

async function toggleUserField(uid, field, value) {
  await apiFetch(`/users/${uid}`, { method: 'PATCH', body: JSON.stringify({ [field]: value }) });
  showUserDetail(uid);
}

async function updateUserTokens(uid) {
  const tokens = parseInt(document.getElementById('editTokens').value);
  await apiFetch(`/users/${uid}`, { method: 'PATCH', body: JSON.stringify({ tokens }) });
  showUserDetail(uid);
}

async function updateUserPremium(uid) {
  const expiry = document.getElementById('editPremiumExpiry').value;
  await apiFetch(`/users/${uid}`, { method: 'PATCH', body: JSON.stringify({ isPremium: true, premiumExpiry: expiry ? new Date(expiry) : null }) });
  showUserDetail(uid);
}

// ════════════════════════════════════════
//  POSTS
// ════════════════════════════════════════
async function renderPosts(page = 1) {
  const d = await apiFetch(`/posts?page=${page}&limit=20`);
  const c = document.getElementById('pageContent');
  c.innerHTML = `
    <h1 class="text-2xl font-bold text-white mb-6">Gönderiler <span class="text-slate-400 text-lg">(${d.total})</span></h1>
    <div class="grid gap-4">
      ${d.posts.map(p => `
        <div class="card p-4 card-hover">
          <div class="flex items-start gap-3">

function chatEmptyState() {

async function fetchChats(page, reset) {
  if (CHATS.loading) return;
  CHATS.loading = true;
  try {
    const d = await apiFetch(`/chats?page=${page}&limit=20&search=${encodeURIComponent(CHATS.search)}`);
    CHATS.page = d.page; CHATS.pages = d.pages; CHATS.total = d.total;
    CHATS.items = reset ? (d.chats || []) : CHATS.items.concat(d.chats || []);
  } finally { CHATS.loading = false; }
  renderChatList();
}

function searchChats() {
  CHATS.search = document.getElementById('chatSearch')?.value || '';
  fetchChats(1, true);
}
function loadMoreChats() { if (CHATS.page < CHATS.pages) fetchChats(CHATS.page + 1, false); }

// Katılımcılardan gerçek kullanıcı ile bot/fake hesabı ayır
function chatParticipants(ch) {
  const ps = ch.participantDetails || [];
  let botIdx = ps.findIndex(p => /fake|bot/i.test(p.role || '') || p.isFake || p.isBot || p.fake);
  const detected = botIdx >= 0;
  if (botIdx < 0) botIdx = ps.length > 1 ? 1 : 0;
  const bot = ps[botIdx] || {};
  const user = ps.find((_, i) => i !== botIdx) || ps[0] || {};
  return { user, bot, detected };
}

function chatAvatar(p, size) {
  const s = size || 40;
  const initial = esc((p.name || p.uid || '?').substring(0, 1).toUpperCase());
  const inner = p.photoURL
    ? `<img src="${p.photoURL}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.parentNode.textContent='${initial}'">`
    : initial;
  return `<div class="rounded-full bg-slate-600 border-2 border-slate-800 flex items-center justify-center text-white font-semibold overflow-hidden shrink-0" style="width:${s}px;height:${s}px;font-size:${Math.round(s/2.4)}px">${inner}</div>`;
}

function chatTimeShort(d) {
  if (!d) return '';
  const dt = new Date(d), diff = (Date.now() - dt.getTime()) / 60000;
  if (diff < 1) return 'şimdi';
  if (diff < 60) return `${Math.floor(diff)} dk`;
  if (diff < 1440) return `${Math.floor(diff / 60)} sa`;
  return `${Math.floor(diff / 1440)} gün`;
}

function renderChatList() {
  const el = document.getElementById('chatList');
  if (!el) return;
  const countEl = document.getElementById('chatCount');
  if (countEl) countEl.textContent = `${CHATS.total} sohbet`;
  const moreWrap = document.getElementById('chatListMore');
  if (moreWrap) moreWrap.classList.toggle('hidden', CHATS.page >= CHATS.pages);
  if (!CHATS.items.length) {
    el.innerHTML = `<div class="text-center text-slate-500 text-sm py-10">Sohbet bulunamadı</div>`;
    return;
  }
  el.innerHTML = CHATS.items.map(ch => {
    const { user, bot } = chatParticipants(ch);
    const active = ch.chatKey === CHATS.activeKey;
    return `<button onclick="openChatPanel('${ch.chatKey}')" class="w-full text-left px-3 py-3 border-b border-slate-800 hover:bg-slate-800/50 transition ${active ? 'bg-slate-800' : ''}" style="${active ? 'box-shadow:inset 3px 0 0 #6366f1' : ''}">
      <div class="flex items-center gap-3">
        <div class="flex -space-x-3 shrink-0">${chatAvatar(user, 38)}${chatAvatar(bot, 38)}</div>
        <div class="min-w-0 flex-1">
          <div class="text-sm font-semibold text-white truncate">${esc(user.name || user.uid?.substring(0, 8) || '—')} <span class="text-slate-500 font-normal">↔</span> ${esc(bot.name || bot.uid?.substring(0, 8) || '—')}</div>
          <div class="flex items-center justify-between gap-2 mt-0.5">
            <span class="text-xs text-slate-400 truncate">${esc(ch.lastMessage || '—')}</span>
            <span class="text-[10px] text-slate-600 shrink-0">${chatTimeShort(ch.lastMessageAt)}</span>
          </div>
        </div>
      </div>
    </button>`;
  }).join('');
}

const MSG_TYPE_LABEL = { image: '📷 Fotoğraf', photo: '📷 Fotoğraf', voice: '🎤 Sesli mesaj', audio: '🎤 Sesli mesaj', gift: '🎁 Hediye', video_call: '📹 Görüntülü Arama', voice_call: '📞 Sesli Arama', location: '📍 Konum', sticker: '✨ Çıkartma' };

async function openChatPanel(chatKey) {
  CHATS.activeKey = chatKey;
  renderChatList();
  const detail = document.getElementById('chatDetail');
  if (!detail) return;
  detail.innerHTML = `<div class="flex-1 flex items-center justify-center"><div class="pulse text-3xl">⏳</div></div>`;
  const ch = CHATS.items.find(c => c.chatKey === chatKey) || { participantDetails: [] };
  const { user, bot, detected } = chatParticipants(ch);
  let d;
  try { d = await apiFetch(`/chats/${chatKey}/messages`); }
  catch (e) { detail.innerHTML = `<div class="flex-1 flex items-center justify-center text-red-400 text-sm">${esc(e.message)}</div>`; return; }
  const msgs = d.messages || [];
  detail.innerHTML = `
    <div class="flex items-center gap-3 p-3 border-b border-slate-700 bg-slate-900/40 shrink-0">
      <div class="flex items-center gap-2 min-w-0">
        ${chatAvatar(user, 40)}
        <div class="min-w-0"><div class="text-white font-semibold text-sm truncate">${esc(user.name || user.uid?.substring(0, 10) || '—')}</div><div class="text-slate-500 text-xs truncate">${esc(user.city || 'Kullanıcı')}</div></div>
      </div>
      <span class="text-slate-600 text-xs px-1 shrink-0">ile</span>
      <div class="flex items-center gap-2 min-w-0">
        ${chatAvatar(bot, 40)}
        <div class="min-w-0"><div class="text-white font-semibold text-sm truncate flex items-center gap-1">${esc(bot.name || bot.uid?.substring(0, 10) || '—')} ${detected ? '<span class="badge badge-purple" style="font-size:10px">🤖 Bot</span>' : ''}</div><div class="text-slate-500 text-xs truncate">${detected ? 'Bot hesabı' : 'Katılımcı'}</div></div>
      </div>
      <div class="ml-auto flex items-center gap-3 shrink-0">
        <span class="text-xs text-slate-500">${msgs.length} mesaj</span>
        <button onclick="openChatPanel('${chatKey}')" class="text-slate-400 hover:text-white" title="Yenile">🔄</button>
      </div>
    </div>
    <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-2" style="background:#0f172a">
      ${msgs.length ? msgs.map(m => chatBubble(m, bot, chatKey)).join('') : '<div class="text-center text-slate-600 text-sm py-10">Bu sohbette mesaj yok</div>'}
    </div>
  `;
  const mc = document.getElementById('chatMessages');
  if (mc) mc.scrollTop = mc.scrollHeight;
}

function isBotMessage(m, bot) {
  const sid = m.senderId || m.senderUid || m.senderUID || m.sender;
  if (sid && bot.uid) return String(sid) === String(bot.uid);
  if (m.senderName && bot.name) return m.senderName === bot.name;
  return false;
}

function chatBubble(m, bot, chatKey) {
  const mine = isBotMessage(m, bot); // bot/fake hesabı sağda
  const body = m.deleted
    ? '<em class="opacity-70">🗑 Silindi</em>'
    : (m.type && m.type !== 'text' ? (MSG_TYPE_LABEL[m.type] || esc(m.type)) : esc(m.text || ''));
  const img = (!m.deleted && m.imageUrl) ? `<img src="${m.imageUrl}" class="mt-2 rounded-lg max-h-48" onerror="this.style.display='none'">` : '';
  const bubbleCls = mine ? 'bg-indigo-500 text-white rounded-2xl rounded-br-md' : 'bg-slate-700 text-slate-100 rounded-2xl rounded-bl-md';
  return `<div class="group flex ${mine ? 'justify-end' : 'justify-start'} ${m.deleted ? 'opacity-60' : ''}">
    <div class="flex items-end gap-1 max-w-[75%] ${mine ? 'flex-row-reverse' : ''}">
      <div class="px-3 py-2 ${bubbleCls}" style="word-break:break-word">
        <div class="text-sm leading-snug">${body}</div>
        ${img}
        <div class="text-[10px] mt-1 ${mine ? 'text-indigo-200' : 'text-slate-400'} text-right">${formatDateTime(m.createdAt)}</div>
      </div>
      <button onclick="deleteChatMessage('${chatKey}','${m._id}')" class="opacity-0 group-hover:opacity-100 text-slate-500 hover:text-red-400 text-xs transition shrink-0" title="Mesajı sil">🗑</button>
    </div>
  </div>`;
}

async function deleteChatMessage(chatKey, msgId) {
  if (!confirm('Bu mesajı silmek istediğinize emin misiniz?')) return;
  await apiFetch(`/chats/${chatKey}/messages/${msgId}`, { method: 'DELETE' });
  openChatPanel(chatKey);
}

async function sendNotification() {
  const title = document.getElementById('notifTitle').value;
  const body = document.getElementById('notifBody').value;

  const resultEl = document.getElementById('notifResult');

  try {

    resultEl.innerHTML = `<div class="p-3 rounded-lg bg-emerald-900/50 border border-emerald-700 text-emerald-300">✅ ${d.sent} / ${d.total} kullanıcıya gönderildi</div>`;

  } catch (e) {
    resultEl.innerHTML = `<div class="p-3 rounded-lg bg-red-900/50 border border-red-700 text-red-300">❌ Hata: ${e.message}</div>`;

                <button onclick="deleteGift('${g._id}')" class="text-red-400 hover:text-red-300 text-sm">Sil</button>
              </div>
            </div>
          `).join('')}

        </div>
      </div>
      <div>
        <h2 class="text-lg font-semibold text-white mb-3">En Çok Gönderilen</h2>
        <div class="card p-4">

            <div class="flex items-center justify-between py-2 ${i > 0 ? 'border-t border-slate-700' : ''}">
              <span class="text-white">${i + 1}. ${esc(s._id || 'Bilinmeyen')}</span>
              <span class="text-amber-400 font-semibold">${s.count} kez</span>

          `).join('') : '<p class="text-slate-500 text-center py-4">Veri yok</p>'}

      </div>

}

function showGiftForm(id, name, emoji, price, color, active, order) {
  const isEdit = !!id;
  showModal(`
    <h2 class="text-lg font-bold text-white mb-4">${isEdit ? 'Hediye Düzenle' : 'Yeni Hediye'}</h2>
    <div class="space-y-3">
      <div><label class="text-sm text-slate-400">İsim</label><input id="giftName" class="input mt-1" value="${name || ''}"></div>
      <div><label class="text-sm text-slate-400">Emoji</label><input id="giftEmoji" class="input mt-1" value="${emoji || ''}"></div>
      <div><label class="text-sm text-slate-400">Fiyat (jeton)</label><input id="giftPrice" type="number" class="input mt-1" value="${price || 10}"></div>
      <div><label class="text-sm text-slate-400">Renk</label><input id="giftColor" type="color" class="input mt-1 h-10" value="${color || '#FF6B6B'}"></div>
      <div><label class="text-sm text-slate-400">Sıra</label><input id="giftOrder" type="number" class="input mt-1" value="${order || 0}"></div>
      <div class="flex items-center gap-2">
        <div id="giftActiveToggle" class="toggle ${active !== false ? 'on' : ''}" onclick="this.classList.toggle('on')"></div>
        <span class="text-sm text-slate-400">Aktif</span>
      </div>
      <button onclick="saveGift('${id || ''}')" class="btn-primary w-full">${isEdit ? 'Güncelle' : 'Ekle'}</button>
    </div>
  `);
}

async function saveGift(id) {
  const data = {
    name: document.getElementById('giftName').value,
    emoji: document.getElementById('giftEmoji').value,
    price: parseInt(document.getElementById('giftPrice').value),
    color: document.getElementById('giftColor').value,
    order: parseInt(document.getElementById('giftOrder').value),
    active: document.getElementById('giftActiveToggle').classList.contains('on'),
  };
  if (id) {
    await apiFetch(`/gifts/${id}`, { method: 'PATCH', body: JSON.stringify(data) });
  } else {
    await apiFetch('/gifts', { method: 'POST', body: JSON.stringify(data) });
  }
  closeModal();
  renderGifts();
}

async function deleteGift(id) {
  if (!confirm('Bu hediyeyi silmek istediğinize emin misiniz?')) return;
  await apiFetch(`/gifts/${id}`, { method: 'DELETE' });
  renderGifts();
}

async function addFakePhotos(uid) {
  const urls = document.getElementById('photoUrls').value.split('\\n').map(u => u.trim()).filter(Boolean);
  if (!urls.length) { alert('En az bir URL girin'); return; }
  await apiFetch(`/fake-users/${uid}/photos`, { method: 'POST', body: JSON.stringify({ photos: urls }) });
  showFakeUserPhotos(uid);
}

async function removeFakePhoto(uid, index) {
  const u = await apiFetch(`/users/${uid}`);
  const photos = [...(u.photos || [])];
  photos.splice(index, 1);
  await apiFetch(`/fake-users/${uid}`, { method: 'PATCH', body: JSON.stringify({ photos, photoURL: photos[0] || '' }) });
  showFakeUserPhotos(uid);
}

      <div><label class="text-sm text-slate-400">İsim</label><input id="feName" class="input mt-1" value="${esc(u.name)}"></div>
      <div><label class="text-sm text-slate-400">Yaş</label><input id="feAge" type="number" class="input mt-1" value="${u.age || ''}"></div>
      <div><label class="text-sm text-slate-400">Şehir</label><input id="feCity" class="input mt-1" value="${esc(u.city)}"></div>
      <div><label class="text-sm text-slate-400">Meslek</label><input id="feJob" class="input mt-1" value="${esc(u.job)}"></div>
      <div><label class="text-sm text-slate-400">Boy</label><input id="feHeight" type="number" class="input mt-1" value="${u.height || ''}"></div>
      <div>
        <label class="text-sm text-slate-400">Tür</label>
        <select id="feRole" class="input mt-1">
          <option value="fake-bot" ${u.role === 'fake-bot' ? 'selected' : ''}>🤖 Bot</option>
          <option value="fake-manual" ${u.role === 'fake-manual' ? 'selected' : ''}>👤 Manuel</option>
        </select>
      </div>
      <div class="col-span-2"><label class="text-sm text-slate-400">Bio</label><textarea id="feBio" class="input mt-1" rows="2">${esc(u.bio)}</textarea></div>
      <div class="col-span-2"><label class="text-sm text-slate-400">İlgi Alanları (virgülle)</label><input id="feInterests" class="input mt-1" value="${(u.interests || []).join(', ')}"></div>
    </div>
    <button onclick="saveFakeUser('${uid}')" class="btn-primary w-full mt-4">Kaydet</button>
  `);
}

async function saveFakeUser(uid) {
  const data = {
    name: document.getElementById('feName').value,
    age: parseInt(document.getElementById('feAge').value) || null,
    city: document.getElementById('feCity').value,
    job: document.getElementById('feJob').value,
    height: parseInt(document.getElementById('feHeight').value) || null,
    role: document.getElementById('feRole').value,
    bio: document.getElementById('feBio').value,
    interests: document.getElementById('feInterests').value.split(',').map(s => s.trim()).filter(Boolean),
  };
  await apiFetch(`/fake-users/${uid}`, { method: 'PATCH', body: JSON.stringify(data) });
  closeModal();
  renderFakeUsers();
}

async function deleteFakeUser(uid) {
  if (!confirm('Bu fake kullanıcıyı silmek istediğinize emin misiniz?')) return;
  await apiFetch(`/fake-users/${uid}`, { method: 'DELETE' });
  renderFakeUsers();
}

//  HELPERS
// ════════════════════════════════════════
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function formatDate(d) { if (!d) return '-'; return new Date(d).toLocaleDateString('tr-TR'); }

function formatDateTime(d) { if (!d) return '-'; const dt = new Date(d); return dt.toLocaleDateString('tr-TR') + ' ' + dt.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }); }

function formatUptime(s) {
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  return `${d}g ${h}s ${m}dk`;
}

function statusBadge(s) {
  const map = { pending: ['Bekliyor', 'badge-yellow'], reviewed: ['İnceleniyor', 'badge-blue'], resolved: ['Çözüldü', 'badge-green'], dismissed: ['Reddedildi', 'badge-red'] };
  const [label, cls] = map[s] || [s, ''];
  return `<span class="badge ${cls}">${label}</span>`;
}

function pagination(current, total, fn) {
  if (total <= 1) return '';
  let html = '<div class="flex items-center justify-center gap-2 mt-6">';
  if (current > 1) html += `<button onclick="${fn}(${current - 1})" class="btn-primary text-sm">← Önceki</button>`;
  html += `<span class="text-slate-400 text-sm px-4">${current} / ${total}</span>`;
  if (current < total) html += `<button onclick="${fn}(${current + 1})" class="btn-primary text-sm">Sonraki →</button>`;
  html += '</div>';
  return html;
}

function showModal(content) {
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">${content}<button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white text-xl">✕</button></div>
    </div>
  `;
}

function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

document.getElementById('loginPass')?.addEventListener('keyup', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginUser')?.addEventListener('keyup', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus(); });
